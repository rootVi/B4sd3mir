<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gizli Sinyal</title>
  <style>
    :root {
      --ink: #101114;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.13);
      --line: rgba(255, 255, 255, 0.2);
      --text: #f7f2ea;
      --muted: #c9c0b8;
      --teal: #34c6b4;
      --coral: #ef6f7d;
      --gold: #f4c95d;
      --violet: #8a7dff;
      --green: #80d67a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at 18px 18px, rgba(255, 255, 255, 0.12) 0 1px, transparent 1.4px) 0 0 / 46px 46px,
        linear-gradient(135deg, #101114 0%, #201719 43%, #141b19 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
      user-select: none;
    }

    button:focus-visible {
      outline: 3px solid rgba(244, 201, 93, 0.8);
      outline-offset: 3px;
    }

    .confetti {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    .reveal-overlay {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: grid;
      place-items: center;
      padding: clamp(22px, 7vw, 72px);
      background:
        radial-gradient(circle at center, rgba(244, 201, 93, 0.18), transparent 34%),
        rgba(16, 17, 20, 0.92);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
      transition: opacity 320ms ease, transform 320ms ease;
      text-align: center;
    }

    .reveal-overlay.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .reveal-overlay p {
      margin: 0;
      max-width: 980px;
      color: var(--text);
      font-size: clamp(2.2rem, 9vw, 6.4rem);
      font-weight: 950;
      line-height: 1.02;
      text-wrap: balance;
    }

    .app {
      min-height: 100vh;
      padding: clamp(18px, 4vw, 44px);
      display: grid;
      place-items: center;
      position: relative;
    }

    .screen {
      display: none;
      width: min(1120px, 100%);
      min-height: min(760px, calc(100vh - 48px));
    }

    .screen.active {
      display: grid;
    }

    .intro {
      align-items: center;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.95fr) minmax(300px, 1.05fr);
      gap: clamp(24px, 5vw, 64px);
      align-items: center;
      width: 100%;
    }

    .signal-art {
      min-height: 420px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .signal-art svg {
      width: min(440px, 100%);
      height: auto;
      filter: drop-shadow(0 26px 42px rgba(0, 0, 0, 0.34));
    }

    .orbit {
      transform-origin: 250px 250px;
      animation: spin 18s linear infinite;
    }

    .orbit.second {
      animation-duration: 25s;
      animation-direction: reverse;
    }

    .pulse {
      animation: pulse 1.7s ease-in-out infinite;
    }

    .intro-copy,
    .stage-area,
    .final-copy {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 8px;
    }

    .intro-copy {
      padding: clamp(24px, 5vw, 48px);
      position: relative;
      z-index: 1;
    }

    .label,
    .stage-kicker,
    .tiny {
      margin: 0;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 18px;
      font-size: clamp(2.3rem, 7vw, 5.6rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 10px;
      font-size: clamp(1.8rem, 4vw, 3.6rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    h3 {
      font-size: clamp(1.1rem, 2.4vw, 1.45rem);
      letter-spacing: 0;
    }

    .lead {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.7;
      max-width: 56ch;
    }

    .primary-btn,
    .secondary-btn,
    .dial,
    .tile,
    .fragment,
    .move-btn {
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .primary-btn,
    .secondary-btn {
      min-height: 48px;
      padding: 0 20px;
      border-radius: 8px;
      font-weight: 850;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--coral), var(--gold));
      color: #1d1112;
      box-shadow: 0 14px 34px rgba(239, 111, 125, 0.24);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .dial:hover,
    .tile:hover,
    .fragment:hover,
    .move-btn:hover {
      transform: translateY(-2px);
    }

    .primary-btn:disabled,
    .secondary-btn:disabled,
    .tile:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
    }

    .game {
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 45%, rgba(255, 255, 255, 0.75) 45% 55%, transparent 55%),
        linear-gradient(0deg, transparent 45%, rgba(255, 255, 255, 0.75) 45% 55%, transparent 55%),
        linear-gradient(135deg, var(--teal), var(--violet));
      flex: 0 0 auto;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pip {
      width: 38px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .pip.is-done {
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-color: transparent;
      box-shadow: 0 0 24px rgba(52, 198, 180, 0.28);
    }

    .stage-area {
      padding: clamp(18px, 4vw, 38px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      width: 100%;
      min-height: 610px;
    }

    .stage-head {
      display: grid;
      gap: 8px;
    }

    .stage-head p:last-child {
      margin-bottom: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 70ch;
    }

    .puzzle-host {
      display: grid;
      align-items: center;
      min-height: 330px;
    }

    .hint {
      min-height: 52px;
      padding: 14px 16px;
      border: 1px solid rgba(244, 201, 93, 0.3);
      background: rgba(244, 201, 93, 0.08);
      border-radius: 8px;
      color: #f8df9b;
      line-height: 1.45;
    }

    .memory-wrap {
      display: grid;
      grid-template-columns: minmax(220px, 360px) minmax(240px, 1fr);
      gap: clamp(18px, 4vw, 36px);
      align-items: center;
    }

    .memory-grid {
      width: min(360px, 100%);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .tile {
      min-width: 0;
      min-height: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      transform: scale(0.82);
    }

    .tile.is-lit {
      background: var(--teal);
      box-shadow: 0 0 34px rgba(52, 198, 180, 0.55);
    }

    .tile.is-hit {
      border-color: var(--gold);
      background: rgba(244, 201, 93, 0.25);
    }

    .tile.is-wrong {
      border-color: var(--coral);
      background: rgba(239, 111, 125, 0.3);
      animation: shake 220ms ease;
    }

    .status-stack {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 18px rgba(239, 111, 125, 0.5);
      flex: 0 0 auto;
    }

    .status-dot.ok {
      background: var(--green);
      box-shadow: 0 0 18px rgba(128, 214, 122, 0.5);
    }

    .vault-wrap {
      display: grid;
      gap: 24px;
      justify-items: center;
    }

    .dial-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(58px, 86px));
      gap: 12px;
      justify-content: center;
      width: 100%;
    }

    .dial {
      height: clamp(72px, 15vw, 98px);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.1);
      color: var(--gold);
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 950;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .hint-chips {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: var(--muted);
      padding: 9px 12px;
      font-size: 0.92rem;
      line-height: 1;
    }

    .maze-wrap {
      display: grid;
      grid-template-columns: minmax(260px, 430px) minmax(220px, 1fr);
      gap: clamp(18px, 4vw, 34px);
      align-items: center;
    }

    .maze {
      width: min(430px, 100%);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .cell {
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .cell.wall {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.03)),
        #252125;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cell.exit {
      border: 1px solid rgba(244, 201, 93, 0.55);
      background: rgba(244, 201, 93, 0.16);
    }

    .cell.clue::before {
      content: "";
      width: 44%;
      height: 44%;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 22px rgba(239, 111, 125, 0.55);
    }

    .cell.player::after {
      content: "";
      width: 48%;
      height: 48%;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--teal), #f7f2ea);
      box-shadow: 0 0 22px rgba(52, 198, 180, 0.62);
    }

    .move-pad {
      width: min(240px, 100%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      justify-self: center;
    }

    .move-btn {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.1);
      font-size: 1.5rem;
      font-weight: 900;
    }

    .move-btn.blank {
      visibility: hidden;
      pointer-events: none;
    }

    .maze-side {
      display: grid;
      gap: 18px;
      align-content: center;
      justify-items: start;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(52, 198, 180, 0.12);
      border: 1px solid rgba(52, 198, 180, 0.28);
      color: #aaf1e7;
      font-weight: 850;
    }

    .phrase-wrap {
      display: grid;
      gap: 24px;
      align-content: center;
    }

    .slots,
    .fragments {
      display: grid;
      grid-template-columns: repeat(4, minmax(64px, 1fr));
      gap: 12px;
    }

    .slot,
    .fragment {
      min-height: 76px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 950;
      letter-spacing: 0;
    }

    .slot {
      border: 1px dashed rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.34);
      font-size: clamp(1rem, 3vw, 1.55rem);
    }

    .slot.filled {
      border-style: solid;
      border-color: rgba(52, 198, 180, 0.45);
      background: rgba(52, 198, 180, 0.14);
      color: var(--text);
    }

    .fragment {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.1);
      font-size: clamp(1rem, 4vw, 1.7rem);
      color: var(--text);
    }

    .fragment:disabled {
      visibility: hidden;
      pointer-events: none;
    }

    .final {
      place-items: center;
      text-align: center;
    }

    .final-copy {
      width: min(860px, 100%);
      padding: clamp(24px, 6vw, 56px);
      display: grid;
      justify-items: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .cake {
      width: min(250px, 72vw);
      height: 210px;
      position: relative;
      margin-bottom: 4px;
    }

    .cake-base,
    .cake-top {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 8px;
      box-shadow: inset 0 -14px rgba(0, 0, 0, 0.12);
    }

    .cake-base {
      bottom: 0;
      width: 230px;
      height: 96px;
      background:
        linear-gradient(90deg, transparent 0 12%, rgba(255, 255, 255, 0.26) 12% 18%, transparent 18% 32%, rgba(255, 255, 255, 0.22) 32% 38%, transparent 38% 60%, rgba(255, 255, 255, 0.2) 60% 66%, transparent 66% 100%),
        linear-gradient(135deg, var(--coral), #b95085);
    }

    .cake-top {
      bottom: 82px;
      width: 190px;
      height: 72px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 255, 255, 0.24) 18% 25%, transparent 25% 58%, rgba(255, 255, 255, 0.2) 58% 65%, transparent 65% 100%),
        linear-gradient(135deg, var(--gold), #f08d62);
    }

    .candle {
      position: absolute;
      bottom: 150px;
      left: 50%;
      width: 18px;
      height: 48px;
      transform: translateX(-50%);
      border-radius: 5px;
      background: repeating-linear-gradient(45deg, #f7f2ea 0 8px, var(--teal) 8px 16px);
    }

    .flame {
      position: absolute;
      bottom: 196px;
      left: 50%;
      width: 26px;
      height: 34px;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 70% 0 70% 70%;
      background: var(--gold);
      box-shadow: 0 0 28px rgba(244, 201, 93, 0.65);
      animation: flame 900ms ease-in-out infinite alternate;
    }

    .final h2 {
      font-size: clamp(2.1rem, 7vw, 5rem);
      margin: 0;
    }

    .final-name {
      color: var(--gold);
    }

    .final-message {
      max-width: 62ch;
      color: var(--muted);
      line-height: 1.7;
      font-size: clamp(1rem, 2vw, 1.2rem);
    }

    .signature {
      color: var(--teal);
      font-weight: 900;
    }

    .signature:empty {
      display: none;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      50% {
        transform: scale(1.08);
        opacity: 0.72;
      }
    }

    @keyframes shake {
      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    @keyframes flame {
      from {
        transform: translateX(-50%) rotate(39deg) scale(0.92);
      }

      to {
        transform: translateX(-50%) rotate(48deg) scale(1.05);
      }
    }

    @media (max-width: 820px) {
      .screen {
        min-height: auto;
      }

      .intro-grid,
      .memory-wrap,
      .maze-wrap {
        grid-template-columns: 1fr;
      }

      .signal-art {
        min-height: 300px;
      }

      .stage-area {
        min-height: auto;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .memory-grid,
      .maze {
        justify-self: center;
      }

      .maze-side {
        justify-items: center;
      }
    }

    @media (max-width: 540px) {
      .app {
        padding: 14px;
      }

      .intro-copy,
      .stage-area,
      .final-copy {
        padding: 18px;
      }

      .dial-row,
      .slots,
      .fragments {
        gap: 8px;
      }

      .slot,
      .fragment {
        min-height: 64px;
      }

      .chip {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>
  <div class="reveal-overlay" id="revealOverlay" aria-live="polite" aria-hidden="true">
    <p id="revealText"></p>
  </div>

  <script>
    window.forceStartGameScreen = function () {
      var introScreen = document.getElementById("introScreen");
      var gameScreen = document.getElementById("gameScreen");

      if (!introScreen || !gameScreen) {
        return;
      }

      introScreen.className = introScreen.className.replace(/\s*\bactive\b/g, "");

      if (gameScreen.className.indexOf("active") === -1) {
        gameScreen.className += " active";
      }
    };

    window.startGame = function () {
      window.forceStartGameScreen();

      if (typeof window.renderStage === "function") {
        window.renderStage();
      }
    };
  </script>

  <main class="app">
    <section class="screen intro active" id="introScreen" aria-labelledby="introTitle">
      <div class="intro-grid">
        <div class="signal-art" aria-hidden="true">
          <svg viewBox="0 0 500 500" role="img">
            <defs>
              <linearGradient id="coreGradient" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#34c6b4"></stop>
                <stop offset="0.52" stop-color="#8a7dff"></stop>
                <stop offset="1" stop-color="#ef6f7d"></stop>
              </linearGradient>
              <linearGradient id="goldGradient" x1="0" x2="1">
                <stop offset="0" stop-color="#f4c95d"></stop>
                <stop offset="1" stop-color="#ef6f7d"></stop>
              </linearGradient>
            </defs>
            <circle cx="250" cy="250" r="178" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"></circle>
            <circle cx="250" cy="250" r="118" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="2"></circle>
            <g class="orbit">
              <circle cx="250" cy="72" r="9" fill="#f4c95d"></circle>
              <circle cx="428" cy="250" r="7" fill="#34c6b4"></circle>
              <circle cx="250" cy="428" r="9" fill="#ef6f7d"></circle>
              <circle cx="72" cy="250" r="7" fill="#8a7dff"></circle>
            </g>
            <g class="orbit second">
              <rect x="242" y="100" width="16" height="16" rx="4" fill="#f7f2ea"></rect>
              <rect x="384" y="242" width="16" height="16" rx="4" fill="#f7f2ea"></rect>
              <rect x="242" y="384" width="16" height="16" rx="4" fill="#f7f2ea"></rect>
              <rect x="100" y="242" width="16" height="16" rx="4" fill="#f7f2ea"></rect>
            </g>
            <path d="M180 202 L250 156 L320 202 L320 298 L250 344 L180 298 Z" fill="url(#coreGradient)" opacity=".95"></path>
            <path d="M180 202 L250 248 L320 202" fill="none" stroke="rgba(255,255,255,.46)" stroke-width="4"></path>
            <path d="M250 248 L250 344" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="4"></path>
            <circle class="pulse" cx="250" cy="248" r="34" fill="url(#goldGradient)" opacity=".92"></circle>
            <path d="M222 252 Q250 226 278 252" fill="none" stroke="#101114" stroke-width="9" stroke-linecap="round"></path>
            <rect x="232" y="248" width="36" height="34" rx="8" fill="#101114"></rect>
          </svg>
        </div>

        <div class="intro-copy">
          <p class="label">Arşiv protokolü</p>
          <h1 id="introTitle">Gizli sinyal yakalandı.</h1>
          <p class="lead">Kaynağı belirsiz. İçinde dört kilit var. Kilitler açıldıkça mesajın gerçek anlamı ortaya çıkacak.</p>
          <button class="primary-btn" id="startBtn" type="button">Sinyali aç</button>
        </div>
      </div>
    </section>

    <section class="screen game" id="gameScreen" aria-live="polite">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Gizli Sinyal</span>
        </div>
        <div class="progress" id="progress" aria-label="İlerleme"></div>
      </header>

      <section class="stage-area">
        <div class="stage-head">
          <p class="stage-kicker" id="stageKicker">Kilit 1</p>
          <h2 id="stageTitle">Frekans tahtası</h2>
          <p id="stageText"></p>
        </div>
        <div class="puzzle-host" id="puzzleHost"></div>
        <div class="hint" id="hint"></div>
      </section>
    </section>

    <section class="screen final" id="finalScreen" aria-labelledby="finalTitle">
      <div class="final-copy">
        <div class="cake" aria-hidden="true">
          <div class="flame"></div>
          <div class="candle"></div>
          <div class="cake-top"></div>
          <div class="cake-base"></div>
        </div>
        <p class="label">Sinyalin gerçek mesajı</p>
        <h2 id="finalTitle">İyi ki doğdun, <span class="final-name" id="finalName">canım arkadaşım</span>.</h2>
        <p class="final-message" id="finalMessage"></p>
        <p class="signature" id="signature"></p>
        <div class="actions">
          <button class="primary-btn" id="againBtn" type="button">Tekrar oyna</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const CONFIG = {
      friendName: "Canım arkadaşım",
      senderName: "",
      birthdayCode: "0707",
      finalMessage: "Bu küçük gizemi çözene kadar sakladım: bugün bütün ışıklar senin için yanıyor. İyi ki varsın, iyi ki doğdun."
    };

    const stages = [
      {
        kicker: "Kilit 1",
        title: "Frekans tahtası",
        text: "Tahta kısa süreliğine yanacak. Aynı izi yakalarsan ilk parça çözülecek.",
        hint: "Hazır olduğunda sinyali göster."
      },
      {
        kicker: "Kilit 2",
        title: "Zaman kasası",
        text: "Dört haneli kod arşivin kapısını açıyor. Gün ve ay aynı sıraya dizildiğinde kasa susacak.",
        hint: "İlk iki hane gün, son iki hane ay."
      },
      {
        kicker: "Kilit 3",
        title: "Anı labirenti",
        text: "Işığı üç parça üzerinden geçir ve çıkışa ulaştır. Eksik parça kalırsa kapı açılmaz.",
        hint: "Parçalar pembe yanıyor. Çıkış sarı bölgede."
      },
      {
        kicker: "Kilit 4",
        title: "Mesaj kilidi",
        text: "Sinyal artık saklanamıyor. Parçaları doğru sıraya koy ve mesajı tamamla.",
        hint: "Sıralama doğru olduğunda son kapı açılır."
      }
    ];

    const introScreen = document.getElementById("introScreen");
    const gameScreen = document.getElementById("gameScreen");
    const finalScreen = document.getElementById("finalScreen");
    const startBtn = document.getElementById("startBtn");
    const againBtn = document.getElementById("againBtn");
    const progressEl = document.getElementById("progress");
    const stageKicker = document.getElementById("stageKicker");
    const stageTitle = document.getElementById("stageTitle");
    const stageText = document.getElementById("stageText");
    const puzzleHost = document.getElementById("puzzleHost");
    const hintEl = document.getElementById("hint");
    const finalName = document.getElementById("finalName");
    const finalMessage = document.getElementById("finalMessage");
    const signature = document.getElementById("signature");
    const revealOverlay = document.getElementById("revealOverlay");
    const revealText = document.getElementById("revealText");
    const confettiCanvas = document.getElementById("confetti");
    const confettiContext = confettiCanvas.getContext("2d");

    const state = {
      stage: 0,
      solved: [false, false, false, false],
      confetti: [],
      confettiFrame: 0
    };

    function showScreen(screen) {
      [introScreen, gameScreen, finalScreen].forEach((item) => item.classList.remove("active"));
      screen.classList.add("active");
    }

    function renderProgress() {
      progressEl.innerHTML = "";
      state.solved.forEach((done, index) => {
        const pip = document.createElement("span");
        pip.className = "pip" + (done ? " is-done" : "");
        pip.setAttribute("aria-label", `${index + 1}. kilit ${done ? "açık" : "kapalı"}`);
        progressEl.appendChild(pip);
      });
    }

    function renderStage() {
      const current = stages[state.stage];
      stageKicker.textContent = current.kicker;
      stageTitle.textContent = current.title;
      stageText.textContent = current.text;
      hintEl.textContent = current.hint;
      renderProgress();

      if (state.stage === 0) {
        renderMemoryPuzzle();
      }

      if (state.stage === 1) {
        renderVaultPuzzle();
      }

      if (state.stage === 2) {
        renderMazePuzzle();
      }

      if (state.stage === 3) {
        renderPhrasePuzzle();
      }
    }

    window.renderStage = renderStage;

    function solveStage(message) {
      state.solved[state.stage] = true;
      renderProgress();
      hintEl.textContent = message;

      if (state.stage < stages.length - 1) {
        showRevealTransition(message, () => {
          state.stage += 1;
          renderStage();
        }, 4000);
        return;
      }

      showRevealTransition(message, revealFinal, 4000);
    }

    function showRevealTransition(message, onComplete, duration) {
      revealText.textContent = message;
      revealOverlay.setAttribute("aria-hidden", "false");
      revealOverlay.classList.add("active");

      window.setTimeout(() => {
        revealOverlay.classList.remove("active");
        revealOverlay.setAttribute("aria-hidden", "true");
        onComplete();
      }, duration);
    }

    function bindPress(element, handler) {
      let lastElementPress = 0;

      function run(event) {
        if (element.disabled) {
          return;
        }

        lastElementPress = Date.now();
        if (event.cancelable) {
          event.preventDefault();
        }
        handler(event);
      }

      if (window.PointerEvent) {
        element.addEventListener("pointerup", (event) => {
          if (event.pointerType !== "mouse") {
            run(event);
          }
        }, { passive: false });
      } else {
        element.addEventListener("touchend", run, { passive: false });
      }

      element.addEventListener("click", (event) => {
        if (Date.now() - lastElementPress < 650 || element.disabled) {
          return;
        }

        handler(event);
      });
    }

    function renderMemoryPuzzle() {
      const sequence = shuffle([0, 1, 2, 3, 4, 5, 6, 7, 8]).slice(0, 4);
      let position = 0;
      let accepting = false;

      puzzleHost.innerHTML = `
        <div class="memory-wrap">
          <div class="memory-grid" id="memoryGrid"></div>
          <div class="status-stack">
            <p class="tiny">Sinyal izi</p>
            <h3>Yanma sırasını tekrar et.</h3>
            <div class="status-line"><span class="status-dot" id="memoryDot"></span><span id="memoryStatus">Sinyal henüz okunmadı.</span></div>
            <button class="primary-btn" id="playSequence" type="button">Sinyali göster</button>
          </div>
        </div>
      `;

      const grid = document.getElementById("memoryGrid");
      const playButton = document.getElementById("playSequence");
      const memoryStatus = document.getElementById("memoryStatus");
      const memoryDot = document.getElementById("memoryDot");

      for (let index = 0; index < 9; index += 1) {
        const tile = document.createElement("button");
        tile.className = "tile";
        tile.type = "button";
        tile.disabled = true;
        tile.dataset.index = String(index);
        tile.setAttribute("aria-label", `${index + 1}. frekans hücresi`);
        bindPress(tile, () => {
          if (!accepting) {
            return;
          }

          const expected = sequence[position];
          if (index === expected) {
            tile.classList.add("is-hit");
            position += 1;
            memoryStatus.textContent = `${position} / ${sequence.length} iz doğru.`;

            if (position === sequence.length) {
              accepting = false;
              disableTiles(true);
              memoryDot.classList.add("ok");
              solveStage("İlk kilit açıldı. Sinyal sıradan bir kayıt değil.");
            }
          } else {
            tile.classList.add("is-wrong");
            accepting = false;
            position = 0;
            memoryDot.classList.remove("ok");
            memoryStatus.textContent = "Dalga bozuldu. Sinyali tekrar oku.";
            hintEl.textContent = "Yanlış hücre sırası kilidi sıfırladı.";
            disableTiles(true);
            playButton.disabled = false;
            window.setTimeout(() => tile.classList.remove("is-wrong"), 280);
          }
        });
        grid.appendChild(tile);
      }

      function disableTiles(disabled) {
        grid.querySelectorAll(".tile").forEach((tile) => {
          tile.disabled = disabled;
        });
      }

      async function flashSequence() {
        accepting = false;
        position = 0;
        playButton.disabled = true;
        memoryStatus.textContent = "Sinyal okunuyor.";
        disableTiles(true);
        grid.querySelectorAll(".tile").forEach((tile) => tile.classList.remove("is-hit", "is-wrong"));

        for (const item of sequence) {
          await wait(260);
          const tile = grid.querySelector(`[data-index="${item}"]`);
          tile.classList.add("is-lit");
          await wait(430);
          tile.classList.remove("is-lit");
        }

        memoryStatus.textContent = "Şimdi aynı izi seç.";
        accepting = true;
        disableTiles(false);
      }

      bindPress(playButton, flashSequence);
    }

    function renderVaultPuzzle() {
      const target = String(CONFIG.birthdayCode).replace(/\D/g, "").padStart(4, "0").slice(0, 4);
      const digits = [0, 0, 0, 0];
      let attempts = 0;

      puzzleHost.innerHTML = `
        <div class="vault-wrap">
          <div class="dial-row" id="dialRow"></div>
          <div class="hint-chips">
            <span class="chip">GGAA</span>
            <span class="chip">Gün önce gelir</span>
            <span class="chip">Ay kapıyı tamamlar</span>
          </div>
          <button class="primary-btn" id="tryCode" type="button">Kodu dene</button>
        </div>
      `;

      const dialRow = document.getElementById("dialRow");
      const tryCode = document.getElementById("tryCode");

      digits.forEach((digit, index) => {
        const dial = document.createElement("button");
        dial.className = "dial";
        dial.type = "button";
        dial.textContent = String(digit);
        dial.setAttribute("aria-label", `${index + 1}. kod hanesi`);
        bindPress(dial, () => {
          digits[index] = (digits[index] + 1) % 10;
          dial.textContent = String(digits[index]);
        });
        dialRow.appendChild(dial);
      });

      bindPress(tryCode, () => {
        const guess = digits.join("");
        attempts += 1;

        if (guess === target) {
          solveStage("Zaman kasası açıldı. Bu tarih boşuna seçilmemiş.");
          return;
        }

        if (attempts >= 2) {
          hintEl.textContent = `Kasa fısıldıyor: kod ${target.slice(0, 2)} / ${target.slice(2)} biçiminde.`;
        } else {
          hintEl.textContent = "Kasa kımıldadı ama açılmadı. Gün ve ay yerini tekrar kontrol et.";
        }
      });
    }

    function renderMazePuzzle() {
      const mazeMap = [
        "#######",
        "#S..C.#",
        "#.#.#.#",
        "#...#E#",
        "#.###.#",
        "#C..C.#",
        "#######"
      ];
      const start = { row: 1, col: 1 };
      const exit = { row: 3, col: 5 };
      const player = { row: start.row, col: start.col };
      const collected = new Set();
      const totalClues = mazeMap.join("").split("C").length - 1;

      puzzleHost.innerHTML = `
        <div class="maze-wrap">
          <div class="maze" id="maze"></div>
          <div class="maze-side">
            <p class="counter" id="mazeCounter">0 / ${totalClues} parça</p>
            <div class="move-pad" aria-label="Labirent kontrolleri">
              <button class="move-btn blank" type="button" tabindex="-1"></button>
              <button class="move-btn" type="button" data-move="-1,0" aria-label="Yukarı">↑</button>
              <button class="move-btn blank" type="button" tabindex="-1"></button>
              <button class="move-btn" type="button" data-move="0,-1" aria-label="Sol">←</button>
              <button class="move-btn blank" type="button" tabindex="-1"></button>
              <button class="move-btn" type="button" data-move="0,1" aria-label="Sağ">→</button>
              <button class="move-btn blank" type="button" tabindex="-1"></button>
              <button class="move-btn" type="button" data-move="1,0" aria-label="Aşağı">↓</button>
              <button class="move-btn blank" type="button" tabindex="-1"></button>
            </div>
          </div>
        </div>
      `;

      const maze = document.getElementById("maze");
      const mazeCounter = document.getElementById("mazeCounter");

      function renderMaze() {
        maze.innerHTML = "";
        mazeMap.forEach((row, rowIndex) => {
          row.split("").forEach((cellType, colIndex) => {
            const cell = document.createElement("div");
            const key = `${rowIndex},${colIndex}`;
            cell.className = "cell";

            if (cellType === "#") {
              cell.classList.add("wall");
            }

            if (cellType === "E") {
              cell.classList.add("exit");
            }

            if (cellType === "C" && !collected.has(key)) {
              cell.classList.add("clue");
            }

            if (player.row === rowIndex && player.col === colIndex) {
              cell.classList.add("player");
            }

            maze.appendChild(cell);
          });
        });

        mazeCounter.textContent = `${collected.size} / ${totalClues} parça`;
      }

      function move(rowDelta, colDelta) {
        const next = {
          row: player.row + rowDelta,
          col: player.col + colDelta
        };
        const nextRow = mazeMap[next.row];
        const nextCell = nextRow ? nextRow[next.col] : undefined;

        if (!nextCell || nextCell === "#") {
          hintEl.textContent = "Duvar sinyali geri itti.";
          return;
        }

        player.row = next.row;
        player.col = next.col;

        if (nextCell === "C") {
          const key = `${next.row},${next.col}`;
          collected.add(key);
          hintEl.textContent = "Bir parça daha yerine oturdu.";
        }

        renderMaze();

        if (player.row === exit.row && player.col === exit.col) {
          if (collected.size === totalClues) {
            solveStage("Labirent tamamlandı. Sinyalin içinde sıcak bir mesaj var.");
          } else {
            hintEl.textContent = "Kapı ışıldadı ama eksik parça kaldı.";
          }
        }
      }

      document.querySelectorAll("[data-move]").forEach((button) => {
        bindPress(button, () => {
          const [rowDelta, colDelta] = button.dataset.move.split(",").map(Number);
          move(rowDelta, colDelta);
        });
      });

      const keyHandler = (event) => {
        if (state.stage !== 2 || !gameScreen.classList.contains("active")) {
          return;
        }

        const moves = {
          ArrowUp: [-1, 0],
          ArrowDown: [1, 0],
          ArrowLeft: [0, -1],
          ArrowRight: [0, 1],
          w: [-1, 0],
          s: [1, 0],
          a: [0, -1],
          d: [0, 1]
        };

        if (moves[event.key]) {
          event.preventDefault();
          move(moves[event.key][0], moves[event.key][1]);
        }
      };

      window.onkeydown = keyHandler;
      renderMaze();
    }

    function renderPhrasePuzzle() {
      const correct = ["İYİ", "Kİ", "DOĞ", "DUN"];
      const fragments = shuffle(correct.slice());
      const answer = [];

      puzzleHost.innerHTML = `
        <div class="phrase-wrap">
          <div class="slots" id="slots"></div>
          <div class="fragments" id="fragments"></div>
          <button class="secondary-btn" id="resetPhrase" type="button">Sıfırla</button>
        </div>
      `;

      const slots = document.getElementById("slots");
      const fragmentWrap = document.getElementById("fragments");
      const resetPhrase = document.getElementById("resetPhrase");

      correct.forEach((_, index) => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.textContent = `${index + 1}`;
        slots.appendChild(slot);
      });

      fragments.forEach((fragment, index) => {
        const button = document.createElement("button");
        button.className = "fragment";
        button.type = "button";
        button.textContent = fragment;
        button.dataset.fragment = fragment;
        button.dataset.index = String(index);
        bindPress(button, () => chooseFragment(button));
        fragmentWrap.appendChild(button);
      });

      bindPress(resetPhrase, reset);

      function chooseFragment(button) {
        const fragment = button.dataset.fragment;
        const nextIndex = answer.length;

        if (fragment !== correct[nextIndex]) {
          hintEl.textContent = "Parça yerine oturmadı. Cümle baştan toparlanıyor.";
          reset();
          return;
        }

        answer.push(fragment);
        button.disabled = true;
        const slot = slots.children[nextIndex];
        slot.textContent = fragment;
        slot.classList.add("filled");

        if (answer.length === correct.length) {
          solveStage("Son kilit açıldı. Artık saklanacak bir şey kalmadı.");
        } else {
          hintEl.textContent = "Doğru. Sıradaki parçayı bul.";
        }
      }

      function reset() {
        answer.length = 0;
        Array.prototype.slice.call(slots.children).forEach((slot, index) => {
          slot.textContent = `${index + 1}`;
          slot.classList.remove("filled");
        });
        fragmentWrap.querySelectorAll(".fragment").forEach((button) => {
          button.disabled = false;
        });
      }
    }

    function revealFinal() {
      finalName.textContent = CONFIG.friendName;
      finalMessage.textContent = CONFIG.finalMessage;
      signature.textContent = CONFIG.senderName ? `${CONFIG.senderName} tarafından hazırlandı.` : "";
      showScreen(finalScreen);
      startConfetti();
    }

    function restart() {
      state.stage = 0;
      state.solved = [false, false, false, false];
      window.onkeydown = null;
      stopConfetti();
      showScreen(introScreen);
    }

    function shuffle(items) {
      const list = items.slice();
      for (let index = list.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [list[index], list[swapIndex]] = [list[swapIndex], list[index]];
      }
      return list;
    }

    function wait(milliseconds) {
      return new Promise((resolve) => window.setTimeout(resolve, milliseconds));
    }

    function sizeCanvas() {
      const scale = window.devicePixelRatio || 1;
      confettiCanvas.width = Math.floor(window.innerWidth * scale);
      confettiCanvas.height = Math.floor(window.innerHeight * scale);
      confettiCanvas.style.width = `${window.innerWidth}px`;
      confettiCanvas.style.height = `${window.innerHeight}px`;
      confettiContext.setTransform(scale, 0, 0, scale, 0, 0);
    }

    function startConfetti() {
      sizeCanvas();
      state.confetti = Array.from({ length: 150 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * -window.innerHeight,
        size: 7 + Math.random() * 8,
        speed: 2 + Math.random() * 4,
        drift: -1.5 + Math.random() * 3,
        rotation: Math.random() * Math.PI,
        spin: -0.08 + Math.random() * 0.16,
        color: ["#34c6b4", "#ef6f7d", "#f4c95d", "#8a7dff", "#f7f2ea"][Math.floor(Math.random() * 5)]
      }));
      cancelAnimationFrame(state.confettiFrame);
      drawConfetti();
    }

    function drawConfetti() {
      confettiContext.clearRect(0, 0, window.innerWidth, window.innerHeight);

      state.confetti.forEach((piece) => {
        piece.y += piece.speed;
        piece.x += piece.drift;
        piece.rotation += piece.spin;

        if (piece.y > window.innerHeight + 30) {
          piece.y = -30;
          piece.x = Math.random() * window.innerWidth;
        }

        confettiContext.save();
        confettiContext.translate(piece.x, piece.y);
        confettiContext.rotate(piece.rotation);
        confettiContext.fillStyle = piece.color;
        confettiContext.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.58);
        confettiContext.restore();
      });

      state.confettiFrame = requestAnimationFrame(drawConfetti);
    }

    function stopConfetti() {
      cancelAnimationFrame(state.confettiFrame);
      confettiContext.clearRect(0, 0, window.innerWidth, window.innerHeight);
      state.confetti = [];
    }

    function startGame() {
      const alreadyActive = gameScreen.className.indexOf("active") !== -1;

      if (alreadyActive) {
        if (!puzzleHost.hasChildNodes()) {
          renderStage();
        }

        return;
      }

      window.forceStartGameScreen();
      renderStage();
    }

    window.startGame = startGame;

    bindPress(startBtn, startGame);

    bindPress(againBtn, restart);
    window.addEventListener("resize", sizeCanvas);
  </script>
</body>
</html>
